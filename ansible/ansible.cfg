[defaults]
inventory = ./inventory/hosts.ini
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
# 타깃(el8 등)이 python3만 가진 경우 /usr/bin/python 탐색 실패 방지 → python3 기본값.
# 노드별 경로가 다르면 인벤토리 그룹변수 ansible_python_interpreter 로 덮어쓴다.
interpreter_python = /usr/bin/python3
# 폐쇄망: 외부 갤럭시/컬렉션 자동설치 금지
[galaxy]
server_list =
