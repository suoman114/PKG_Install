- name: config sysctl
  hosts: vcs
  remote_user: root
  tasks:
   - sysctl:
      name: vm.vfs_cache_pressure
      value: 10000
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.core.rmem_max
      value: 16777216
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.core.wmem_max
      value: 16777216
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv4.tcp_rmem
      value: 4096 87380 16777216
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv4.tcp_wmem
      value: 4096 65536 16777216
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv4.udp_rmem_min
      value: 16777216
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv4.udp_wmem_min
      value: 16777216
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv4.udp_mem
      value: 565341 753791 16777216
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.core.netdev_max_backlog
      value: 300000
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: kernel.msgmni
      value: 1024
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: kernel.msgmnb
      value: 8192000
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: kernel.msgmax
      value: 8192000
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv6.conf.all.disable_ipv6
      value: 1
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv6.conf.default.disable_ipv6
      value: 1
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.ipv6.conf.lo.disable_ipv6
      value: 1
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: kernel.core_pattern
      value: 'core.%e.%p'
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

   - sysctl:
      name: net.core.rmem_default
      value: 26214400
      sysctl_set: yes
      state: present
      sysctl_file: /etc/sysctl.d/vcs_system.conf

