- name: create authority between server and nodes
  hosts: vcs
  connection: local
  serial : 1
  gather_facts: no
  tasks:
   - name: ssh-keyscan for known_hosts file
     command: /usr/bin/ssh-keyscan -t ecdsa {{ ansible_host }}
     register: keyscan
   - name: input key
     lineinfile:
      path: ~/.ssh/known_hosts
      line: "{{ item }}"
      create: yes
     with_items:
      - "{{ keyscan.stdout_lines }}"
 
- name: create authority between server and nodes
  hosts: vcs 
  connection: local
  gather_facts: no
  vars:
   ansible_password: "{{ ssh_password }}"
  tasks:
   - name: ssh-keygen for authorized_keys file (없을 때만 생성 → 재실행 안전)
     command: "ssh-keygen -b 2048 -t rsa -f {{ '~/.ssh/id_rsa' | expanduser }} -q -N ''"
     args:
       creates: "{{ '~/.ssh/id_rsa' | expanduser }}"
     run_once: true
   - name: input key for each node
     connection: ssh
     authorized_key:
      user: root
      state: present
      key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
 
 
- hosts: vcs
  remote_user: root
  tasks:
 
 
  - name: Disable SELinux
    selinux:
      state: disabled
