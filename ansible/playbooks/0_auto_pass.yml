- name: create authority between server and nodes
  hosts: vcs
  connection: local
  serial : 1
  gather_facts: no
  tasks:
   - name: ssh-keyscan for known_hosts file
     command: /usr/bin/ssh-keyscan -t ecdsa {{ ansible_host }}
     register: keyscan
   - name: input key
     lineinfile:
      path: ~/.ssh/known_hosts
      line: "{{ item }}"
      create: yes
     with_items:
      - "{{ keyscan.stdout_lines }}"
 
- name: create authority between server and nodes
  hosts: vcs 
  connection: local
  gather_facts: no
  vars:
   ansible_password: "{{ ssh_password }}"
  tasks:
   - name: ssh-keygen for authorized_keys file (없을 때만 생성 → 재실행 안전)
     command: "ssh-keygen -b 2048 -t rsa -f {{ '~/.ssh/id_rsa' | expanduser }} -q -N ''"
     args:
       creates: "{{ '~/.ssh/id_rsa' | expanduser }}"
     run_once: true
   - name: input key for each node
     connection: ssh
     authorized_key:
      user: root
      state: present
      key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
 
 
- hosts: vcs
  remote_user: root
  tasks:
  # selinux 모듈은 libselinux-python 바인딩이 필요해 노드마다 실패할 수 있어,
  # 바인딩 없이 동작하는 방식(config 파일 수정 + setenforce)으로 비활성화한다.
  - name: Disable SELinux in config (영구 · 재부팅 후 적용)
    lineinfile:
      path: /etc/selinux/config
      regexp: '^SELINUX='
      line: 'SELINUX=disabled'
  - name: Set SELinux permissive now (재부팅 전까지 적용)
    command: setenforce 0
    failed_when: false
    changed_when: false
