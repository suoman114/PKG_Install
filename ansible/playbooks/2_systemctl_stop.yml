- hosts: vcs 
  remote_user: root
  tasks:


  - name: Disable cron hour,daily,monthly,yearly  
    shell: "chmod 600  /etc/cron.*/*"
 
  - name: Remove net-snmp / postfix (버전 무관 · el7/el8 공통 · 없으면 무시)
    package:
      name:
        - net-snmp
        - postfix
      state: absent


###########need to use el8 
  - name: Stop and Disable service NetworkManager (7 only)
    systemd:
      state: stopped
      enabled : no
      name : NetworkManager
    ignore_errors: yes
    when:
        - ansible_distribution_major_version | int < 8

  - name: Stop and Disable  chronyd
    systemd:
      state: stopped
      enabled : no
      name : chronyd
    ignore_errors: yes
    when:
        - ansible_distribution_major_version | int < 8


  - name: Stop and Disable  avahi-daemon
    systemd:
      state: stopped
      enabled : no
      name : avahi-daemon
    ignore_errors: yes


  - name: Stop and Disable  firewalld
    systemd:
      state: stopped
      enabled : no
      name : firewalld
    ignore_errors: yes

  - name: Rsyslog edit 1
    replace:
      path: /etc/rsyslog.conf
      regexp: 'cron.none'
      replace: "cron.none;local0.none"


  - name: Rsysclog edit 2
    lineinfile:
      path: /etc/rsyslog.conf
      state: present
      insertafter:  '/var/log/boot.log'
      line: "local0.*						/var/log/vcs.log"

  - name: Restart rsyslog
    systemd:
      state: restarted
      name : rsyslog



