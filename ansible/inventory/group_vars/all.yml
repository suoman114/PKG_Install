# 모든 노드 공통 변수 — 인벤토리(-i)와 함께 ansible 이 자동 로드한다.
# (커밋되는 파일이므로 git pull 만 하면 적용 · 대시보드 재시작/인벤토리 저장 불필요)
#
# 파이썬 인터프리터: el8 시스템 파이썬(platform-python, 3.6) 고정.
#   이유: 이 파이썬에는 시스템 바인딩(python3-dnf, libselinux 등)이 기본 포함되어
#   yum/package·selinux 등 시스템 관리 모듈이 정상 동작한다.
#   별도 설치된 /usr/bin/python3(예: python3.9)에는 이 바인딩이 없어
#   "No module named 'dnf'/'selinux'" 류 실패가 난다.
#   (노드 파이썬 경로가 다르면 그 노드의 host_vars/<node>.yml 에서 덮어쓴다)
ansible_python_interpreter: /usr/libexec/platform-python
