# 모든 노드 공통 변수 — 인벤토리(-i)와 함께 ansible 이 자동 로드한다.
# (커밋되는 파일이므로 git pull 만 하면 적용 · 대시보드 재시작/인벤토리 저장 불필요)
#
# 파이썬 인터프리터: python3 명시 지정.
#   auto_silent(자동탐지)이 일부 노드에서 /usr/bin/python(python2)로 잘못 잡히는
#   문제가 있어, el8 표준 경로 /usr/bin/python3 로 고정한다.
#   (노드의 python3 경로가 다르면 그 노드의 host_vars/<node>.yml 에서 덮어쓴다)
ansible_python_interpreter: /usr/bin/python3
