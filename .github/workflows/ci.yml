name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: backend (compile + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"   # 타깃은 py3.6 — 핀(Flask 2.0.3) 유효 범위 내 최신 CI 런타임
      - name: Install dashboard deps (pinned)
        run: python -m pip install -r backend/requirements.txt
      - name: Byte-compile backend
        run: python -m py_compile backend/*.py tests/smoke.py
      - name: Smoke test (Flask test_client, mock mode)
        run: python tests/smoke.py

  ansible:
    name: ansible (syntax-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ansible
        run: python -m pip install ansible
      - name: yamllint-free structural parse + syntax-check all playbooks
        working-directory: ansible
        run: |
          set -e
          fail=0
          for pb in playbooks/*.yml; do
            echo "── $pb"
            ansible-playbook --syntax-check -i inventory/hosts.ini "$pb" || fail=1
          done
          exit $fail
